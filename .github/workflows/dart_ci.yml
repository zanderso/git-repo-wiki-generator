name: Dart CI

on:
  pull_request:
    branches: [ main, master ]

# Least privilege permissions required for checkout, analysis, and testing
permissions:
  contents: read

jobs:
  build:
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]

    steps:
      - name: Checkout repository
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7

      - name: Setup Dart SDK
        uses: dart-lang/setup-dart@2bd11704788983a6a210731656d0042e2df8b2c1 # v1.7.2
        with:
          sdk: stable

      - name: Install dependencies
        run: dart pub get

      - name: Check formatting
        run: dart format --output=none --set-exit-if-changed .

      - name: Analyze code
        run: dart analyze

      - name: Run tests
        run: dart test
